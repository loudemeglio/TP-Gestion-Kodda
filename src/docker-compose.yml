services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Sobrescribe el host de la DB del .env local (suele ser localhost) por el servicio en la red de Compose.
      DATABASE_URL: postgresql://user:password@db:5432/mydatabase
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:3000"
    stdin_open: true # Para que React no se cierre en Docker
    environment:
      # setupProxy.js reenvía /api aquí; dentro de Docker 127.0.0.1 es este contenedor, no el backend.
      PROXY_API_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: